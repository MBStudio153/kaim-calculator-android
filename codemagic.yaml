workflows:
  android-workflow:
    name: Capacitor Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      android_signing:
        - Kaim_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.mbstudio153.kaimcalculator"
        GOOGLE_PLAY_TRACK: internal

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          mkdir -p www
          cp index.html book.html stylesheet.css www/
          cp section*.xhtml www/
          echo "Contents of www/:"
          ls -la www

      - name: Add & sync Capacitor Android
        script: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android (debug APK)
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - mmbernau@gmail.com
        notify:
          success: true
          failure: true
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: $GOOGLE_PLAY_TRACK
      #   submit_as_draft: true
