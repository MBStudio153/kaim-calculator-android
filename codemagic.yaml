workflows:
  android-workflow:
    name: Capacitor Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2     # Free tier: 500 min/month run on this machine only.
    environment:
      node: 20                     # Match the Node version you use locally (18, 20, latest).
      # --- Uncomment when ready for a SIGNED release ---
      # android_signing:
      #   - keystore_reference
      # groups:
      #   - google_play
      # vars:
      #   PACKAGE_NAME: "com.yourcompany.yourapp"
      #   GOOGLE_PLAY_TRACK: internal

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main            # <-- change to your branch
          include: true
          source: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build            # Builds your web app into dist/www.

      - name: Add & sync Capacitor Android
        script: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android     # Generates capacitor.settings.gradle + copies web assets.

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      - name: Build Android (debug APK)
        script: |
          cd android
          ./gradlew assembleDebug

      # --- RELEASE BUILD: comment out the debug step above, use this instead ---
      # - name: Build Android (signed release)
      #   script: |
      #     cd android
      #     ./gradlew assembleRelease     # APK -> direct download/sideload
      #     # ./gradlew bundleRelease     # AAB -> required for Google Play

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - mmbernau@gmail.com     # Get the APK + logs when the build finishes.
        notify:
          success: true
          failure: true

      # --- Publish to Google Play (uncomment when ready) ---
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: $GOOGLE_PLAY_TRACK
      #   submit_as_draft: true
